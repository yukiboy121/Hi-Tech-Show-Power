<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#d32f2f" />
    <title>Hi Tech Show Power</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="loader">
      <div class="logo">HP</div>
      <p class="title">Hi Tech Show Power</p>
      <p class="subtitle">24 Hour Service</p>
      <div class="spinner"></div>
      <p class="hint">Loading…</p>
    </div>
    <script>
      // Fallback if server.url fails — update capacitor.config.ts with your Vercel URL
      setTimeout(function () {
        var hint = document.querySelector(".hint");
        if (hint) hint.textContent = "Check internet connection or app configuration";
      }, 8000);
    </script>
  </body>
</html>
